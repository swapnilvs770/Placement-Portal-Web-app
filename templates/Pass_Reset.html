<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary-blue: #357ABD;
            --light-blue: #EAF2FA;
            --primary-white: #FFFFFF;
            --background-grey: #F8F9FA;
            --primary-text: #212529;
            --secondary-text: #6C757D;
            --warning-red: #DC3545;
            --border-color: #E9ECEF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-grey);
            color: var(--primary-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .reset-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .reset-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .reset-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .reset-subtitle {
            font-size: 16px;
            color: var(--secondary-text);
        }

        .card {
            background-color: var(--primary-white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 32px;
            overflow: hidden; /* For smooth transitions */
        }
        
        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--secondary-text);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(53, 122, 189, 0.2);
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            background-color: var(--primary-blue);
            color: var(--primary-white);
            transition: background-color 0.2s ease-in-out;
        }

        .btn-primary:hover {
            background-color: #2c6cb0;
        }
        
        .otp-message {
            text-align: center;
            font-size: 14px;
            color: var(--secondary-text);
            margin-bottom: 20px;
        }
        
        #timer {
            font-size: 14px;
            color: var(--warning-red);
            font-weight: 500;
            text-align: center;
            margin-top: 12px;
            height: 20px;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="reset-container">
        <div class="reset-header">
            <div class="reset-logo">
                <i data-lucide="key-round" class="w-8 h-8 text-primary-blue"></i>
            </div>
            <h1 class="reset-title">Password Reset</h1>
            <p class="reset-subtitle" id="page-subtitle">Enter your details to receive an OTP</p>
        </div>
        
        <div class="card">
            <div id="step1" class="form-step active">
                <form onsubmit="return false;">
                    <div class="form-group">
                        <label for="UserId" class="form-label">User ID</label>
                        <input type="text" id="UserId" class="form-input" placeholder="Enter your User ID" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" required>
                    </div>
                    <button type="button" class="btn-primary" onclick="sendOTP()">Get OTP</button>
                </form>
            </div>

            <div id="step2" class="form-step">
                 <p id="otp-message" class="otp-message">An OTP has been sent to <br><strong id="user-email">your registered email</strong>.</p>
                <form onsubmit="verifyOTP(event)">
                    <div class="form-group">
                        <label for="otp" class="form-label">Enter OTP</label>
                        <input type="text" id="otp" class="form-input" placeholder="6-digit code" required>
                        <p id="timer"></p>
                    </div>
                    <button type="submit" class="btn-primary">Verify & Reset Password</button>
                </form>
            </div>
        </div>
        
        <a href="{{ url_for('student_login') }}" class="back-link">
             &larr; Back to Login
        </a>
    </div>

    <script>
        lucide.createIcons();
        
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const pageSubtitle = document.getElementById('page-subtitle');
        
        let otpTimer;

        function sendOTP() {
            const userId = document.getElementById("UserId").value;
            const newPassword = document.getElementById("newPassword").value;
            
            if (!userId || !newPassword) {
                alert("Please enter both User ID and a new password.");
                return;
            }
            
            fetch("{{ url_for('send_otp_email') }}", {
                method: "POST",
                body: JSON.stringify({ UserId: userId, newpass: newPassword }),
                headers: { "Content-Type": "application/json" },
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById("user-email").textContent = data.email || "your email"; 
                    step1.classList.remove('active');
                    step2.classList.add('active');
                    pageSubtitle.textContent = "Check your email for the OTP";
                    startTimer(300);
                }
            })
            .catch(error => console.error("Error sending OTP:", error));
        }
        
        function verifyOTP(event) {
            event.preventDefault();
            
            const otpInput = document.getElementById("otp").value;
            if (!otpInput) {
                alert("Please enter the OTP.");
                return;
            }
            
            fetch("{{ url_for('verify_otp') }}", {
                method: "POST",
                body: JSON.stringify({ otp: otpInput }),
                headers: { "Content-Type": "application/json" },
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert("Password has been reset successfully!");
                    window.location.href = "{{ url_for('student_login') }}";
                } else {
                    alert(data.error || "Invalid OTP! Please try again.");
                }
            })
            .catch(error => {
                console.error("Error verifying OTP:", error);
                alert("Something went wrong. Please try again.");
            });
        }
        
        function startTimer(duration) {
            const timerDisplay = document.getElementById("timer");
            let timeLeft = duration;
            clearInterval(otpTimer);

            otpTimer = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                
                timerDisplay.textContent = `OTP expires in: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
                timeLeft--;
                
                if (timeLeft < 0) {
                    clearInterval(otpTimer);
                    timerDisplay.textContent = "OTP expired. Please request a new one.";
                    // Optionally, redirect back to step 1 after a delay
                    setTimeout(() => {
                        step2.classList.remove('active');
                        step1.classList.add('active');
                        pageSubtitle.textContent = "Enter your details to receive an OTP";
                    }, 3000);
                }
            }, 1000);
        }

    </script>
</body>
</html>
