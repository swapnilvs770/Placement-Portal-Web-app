<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HOD Dashboard{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',  // Blue-600
            light: '#f9fafb',
            darkText: '#1f2937'
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body class="bg-white text-darkText">

  <!-- Navbar -->
  <nav class="w-full bg-white border-b border-gray-200 shadow-md px-6 py-4 fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <i data-lucide="shield" class="w-6 h-6 text-primary"></i>
        <span class="text-xl font-bold text-primary tracking-wide">HOD's <small class="text-sm text-gray-500">OFFICE
            GCEK</small></span>
      </div>
      <!-- Links -->
      <div class="hidden md:flex space-x-6">
        <a href="{{url_for('hod_dashboard')}}"
          class="{% if request.path == url_for('admin_dashboard') %}text-primary font-medium{% else %}hover:text-primary font-medium{% endif %} transition">Home</a>
        <a href="{{url_for('hod_student_page')}}"
          class="{% if request.path == url_for('student_info') %}text-primary font-medium{% else %}hover:text-primary font-medium{% endif %} transition">Student</a>
        <a href="#"
          class="{% if request.path == '/pricing' %}text-primary font-medium{% else %}hover:text-primary font-medium{% endif %} transition">Demo</a>
        <a href="{{ url_for('applicant_list') }}"
          class="{% if request.path == '/applicant-list' %}text-primary font-medium{% else %}hover:text-primary font-medium{% endif %} transition">
          Applicant List
        </a>

        <a href="#"
          class="{% if request.path == '/pricing' %}text-primary font-medium{% else %}hover:text-primary font-medium{% endif %} transition">Pricing</a>
        <!-- Inside your 'hod_about.html' template -->

        <a href="#"
          class="{% if request.path == '/hod-about' %}text-primary font-medium{% else %}hover:text-primary font-medium{% endif %} transition">
          About
        </a>


      </div>
      <!-- Auth -->
      <div class="hidden md:flex items-center space-x-4">
        <!-- <button class="px-4 py-2 rounded-xl bg-primary text-white font-semibold transition hover:bg-blue-700">Sign
          Up</button> -->
        <a href="{{url_for('logout')}}">
          <button
            class="px-4 py-2 rounded-xl text-primary font-semibold border border-primary transition hover:bg-blue-100">Log
            Out</button></a>
      </div>
      <div class="md:hidden">
        <button id="menu-toggle"><i data-lucide="menu" class="w-6 h-6 text-gray-700"></i></button>
      </div>
    </div>
    <div id="mobile-menu" class="hidden md:hidden mt-4 space-y-3 px-4">
      <a href="/" class="block hover:text-primary">Home</a>
      <a href="#" class="block hover:text-primary">Student</a>
      <a href="#" class="block hover:text-primary">Pricing</a>
      <a href="#" class="block hover:text-primary">About</a>
      <div class="pt-2 border-t border-gray-300">
        <a href="{{url_for('logout')}}"><button
            class="w-full text-left px-4 py-2 text-primary font-semibold border border-primary rounded-xl transition hover:bg-blue-100">Logout</button></a>
        <button
          class="w-full mt-2 text-left px-4 py-2 bg-primary text-white font-semibold rounded-xl transition hover:bg-blue-700">Sign
          Up</button>
      </div>
    </div>
  </nav>

  <div class="flex pt-[4.5rem]">
    <!-- Sidebar -->
    <aside
      class="hidden md:flex flex-col w-64 h-[calc(100vh-4.5rem)] bg-light border-r border-gray-200 shadow-md px-6 py-8 fixed top-[4.5rem] left-0">
      <nav class="flex flex-col space-y-4">
        <a href="/hod-dashboard"
          class="flex items-center gap-3 px-3 py-2 rounded-lg {% if request.path == '/dashboard' %}bg-blue-100 text-primary{% else %}hover:bg-blue-100 text-gray-700 hover:text-primary{% endif %} transition">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
        </a>
        <div class="relative">
          <button id="company-dropdown"
            class="flex items-center gap-2 px-3 py-2 w-full rounded-lg hover:bg-blue-100 text-gray-700 hover:text-primary transition">
            <i data-lucide="building" class="w-5 h-5"></i> Company Info
            <i data-lucide="chevron-down" class="ml-auto w-4 h-4"></i>
          </button>
          <!-- <div class="absolute left-0 w-full bg-white border border-gray-300 mt-2 hidden z-50"
            id="company-dropdown-menu">
            <a href="/companies" class="block px-3 py-2 hover:bg-blue-100 hover:text-primary">See Companies</a>
            <a href="/companies/add" class="block px-3 py-2 hover:bg-blue-100 hover:text-primary">Add Company</a>
            <a href="/companies/edit" class="block px-3 py-2 hover:bg-blue-100 hover:text-primary">Edit Company</a>
          </div>
        </div> -->
        
        <div class="relative">
          <button id="announcement-dropdown"
            class="flex items-center gap-2 px-3 py-2 w-full rounded-lg hover:bg-blue-100 text-gray-700 hover:text-primary transition">
            <i data-lucide="bell" class="w-5 h-5"></i> Announcements
            <i data-lucide="chevron-down" class="ml-auto w-4 h-4"></i>
          </button>

        </div>
        <a href="#"
          class="flex items-center gap-3 px-3 py-2 rounded-lg {% if request.path == '/reports' %}bg-blue-100 text-primary{% else %}hover:bg-blue-100 text-gray-700 hover:text-primary{% endif %} transition">
          <i data-lucide="bar-chart" class="w-5 h-5"></i> Reports
        </a>
        <a href="#"
          class="flex items-center gap-3 px-3 py-2 rounded-lg {% if request.path == '/settings' %}bg-blue-100 text-primary{% else %}hover:bg-blue-100 text-gray-700 hover:text-primary{% endif %} transition">
          <i data-lucide="settings" class="w-5 h-5"></i> Settings
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 md:ml-64 p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Script -->
  <script>
    lucide.createIcons();
    document.getElementById('menu-toggle').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });

    const dropdownButtons = document.querySelectorAll('[id$="-dropdown"]');
    dropdownButtons.forEach(button => {
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        const menuId = button.id.replace('-dropdown', '-dropdown-menu');
        document.getElementById(menuId).classList.toggle('hidden');
      });
    });

    document.addEventListener('click', (event) => {
      dropdownButtons.forEach(button => {
        const menuId = button.id.replace('-dropdown', '-dropdown-menu');
        const dropdownMenu = document.getElementById(menuId);
        if (!button.contains(event.target)) {
          dropdownMenu.classList.add('hidden');
        }
      });
    });

    const dropdownItems = document.querySelectorAll('#company-dropdown-menu a, #announcement-dropdown-menu a');
    dropdownItems.forEach(item => {
      item.addEventListener('click', () => {
        const dropdownMenu = item.closest('.relative').querySelector('.absolute');
        dropdownMenu.classList.add('hidden');
      });
    });
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>
