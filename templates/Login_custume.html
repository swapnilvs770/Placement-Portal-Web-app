<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPO Portal Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary-blue: #357ABD;
            --light-blue: #EAF2FA;
            --primary-white: #FFFFFF;
            --background-grey: #F8F9FA;
            --primary-text: #212529;
            --secondary-text: #6C757D;
            --border-color: #E9ECEF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-grey);
            color: var(--primary-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .login-subtitle {
            font-size: 16px;
            color: var(--secondary-text);
        }

        .card {
            background-color: var(--primary-white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 32px;
        }
        
        .flash-message {
            padding: 12px;
            margin-bottom: 24px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        
        .flash-success {
            background-color: #D1FAE5;
            color: #065F46;
        }

        .flash-danger {
            background-color: #FEE2E2;
            color: #991B1B;
        }
        
        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .role-btn {
            padding: 12px;
            background-color: transparent;
            border: none;
            color: var(--secondary-text);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border-bottom: 2px solid transparent;
        }
        
        .role-btn:not(:last-child) {
            border-right: 1px solid var(--border-color);
        }

        .role-btn.active {
            background-color: var(--light-blue);
            color: var(--primary-blue);
            border-bottom-color: var(--primary-blue);
        }

        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--secondary-text);
            margin-bottom: 8px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }
        
        .form-input {
            width: 90%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(53, 122, 189, 0.2);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .form-footer a {
            font-size: 14px;
            color: var(--primary-blue);
            text-decoration: none;
        }
        
        .form-footer a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            background-color: var(--primary-blue);
            color: var(--primary-white);
            transition: background-color 0.2s ease-in-out;
        }

        .btn-submit:hover {
            background-color: #2c6cb0;
        }
        
        .login-footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--secondary-text);
        }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i data-lucide="shield" class="w-8 h-8 text-primary-blue"></i>
            </div>
            <h1 class="login-title">TPO Portal Login</h1>
            <p class="login-subtitle">Sign in to access your dashboard</p>
        </div>
        
        <div class="card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        
            <form method="POST" action="/login" id="loginForm">
                <input type="hidden" name="role" id="roleInput" value="student">
                
                <div class="role-selector">
                    <button type="button" class="role-btn active" data-role="student">Student</button>
                    <button type="button" class="role-btn" data-role="tpo">TPO</button>
                    <button type="button" class="role-btn" data-role="hod">HOD</button>
                </div>

                <div class="form-group">
                    <label for="user" class="form-label" id="userIdLabel">User ID</label>
                    <div class="input-wrapper">
                        <i data-lucide="user" class="input-icon w-5 h-5"></i>
                        <input type="text" name="User" id="user" class="form-input" placeholder="Enter your User ID" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pass" class="form-label">Password</label>
                     <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon w-5 h-5"></i>
                        <input type="password" name="pass" id="pass" class="form-input" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <div class="form-footer">
                    <a href="{{url_for('password_reset')}}">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>
        
        <p class="login-footer-text">&copy; 2025 TPO Office GCEK. All rights reserved.</p>
    </div>

    <script>
        lucide.createIcons();
        
        document.addEventListener('DOMContentLoaded', function() {
            const roleButtons = document.querySelectorAll('.role-btn');
            const roleInput = document.getElementById('roleInput');
            const userIdLabel = document.getElementById('userIdLabel');
            const userInput = document.getElementById('user');
            
            roleButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Update active button style
                    roleButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Update hidden input value
                    const selectedRole = this.dataset.role;
                    roleInput.value = selectedRole;
                    
                    // Update label and placeholder for clarity
                    if (selectedRole === 'hod') {
                        userIdLabel.textContent = 'HOD Email';
                        userInput.placeholder = 'Enter your official email';
                    } else if (selectedRole === 'tpo') {
                        userIdLabel.textContent = 'TPO Admin ID';
                        userInput.placeholder = 'Enter your Admin ID';
                    } else {
                        userIdLabel.textContent = 'Student ID';
                        userInput.placeholder = 'Enter your Student ID';
                    }
                });
            });
        });
    </script>

</body>
</html>
