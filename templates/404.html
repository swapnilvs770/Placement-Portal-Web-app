<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | TPO GCEK</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-blue: #3B82F6; /* A blue similar to the image */
            --light-grey-bg: #F9FAFB;
            --primary-text: #1F2937;
            --secondary-text: #6B7280;
            --border-color: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-grey-bg);
            color: var(--primary-text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Header styling */
        .header {
            background-color: #FFFFFF;
            border-bottom: 1px solid var(--border-color);
        }
        .header .navbar-brand {
            font-weight: 700;
            color: var(--primary-blue);
        }
        .header .nav-link {
            color: var(--secondary-text);
            font-weight: 500;
        }
        .header .nav-link:hover {
            color: var(--primary-blue);
        }
        .btn-primary {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
            font-weight: 600;
        }

        /* Main content */
        .content-wrapper {
            flex-grow: 1;
        }
        .hero-icon {
            font-size: 4rem;
            color: var(--primary-blue);
        }
        .countdown-card {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i class="bi bi-shield-check"></i>
                <span>TPO GCEK</span>
            </a>
            <nav class="d-none d-md-flex align-items-center gap-4">
                <a class="nav-link" href="{{ url_for('index') }}">Home</a>
              
            </nav>
            <button class="d-md-none btn btn-light">
                <i class="bi bi-list"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="content-wrapper container d-flex flex-column align-items-center justify-content-center text-center py-5">
        
        <i class="bi bi-tools hero-icon mb-4"></i>

        <h1 class="fw-bolder display-4 mb-3">This Page is Under Construction</h1>
        <p class="lead text-secondary col-md-8 col-lg-6 mx-auto mb-5">
            We're working hard behind the scenes to bring this feature to you. It won't be long! Please check back later.
        </p>

    
    </main>

    <script>
        // Set the date for the launch (e.g., 90 days from now)
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 90);

        const countdownFunction = setInterval(() => {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance < 0) {
                clearInterval(countdownFunction);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Add leading zero if number is less than 10
            document.getElementById("days").innerText = days < 10 ? '0' + days : days;
            document.getElementById("hours").innerText = hours < 10 ? '0' + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? '0' + seconds : seconds;

        }, 1000);
    </script>
</body>
</html>
